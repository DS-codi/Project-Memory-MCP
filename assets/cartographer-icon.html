<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Cartographer Neo-Brutalist Icon</title>
    <style>
        /* Neo-brutalist preview styling */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Tan/beige background matches the overall project canvas */
            background-color: #f3e4d0; 
            font-family: 'Courier New', Courier, monospace;
        }

        .icon-container {
            width: 440px;
            height: 520px;
        }
    </style>
</head>
<body>

    <div class="icon-container">
        <!-- Raw, scalable SVG begins here -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 520" width="100%" height="100%">
            <defs>
                <!-- Dark Red Dot Grid Pattern -->
                <pattern id="dotGrid" width="32" height="32" patternUnits="userSpaceOnUse">
                    <circle cx="16" cy="16" r="2.5" fill="#990000" />
                </pattern>

                <!-- Clip path for the inner frame to ensure the globe sits neatly inside -->
                <clipPath id="innerFrameClip">
                    <rect x="50" y="116" width="260" height="260" />
                </clipPath>
            </defs>

            <!-- 1. Master Offset Shadow (Dark Red) -->
            <rect x="40" y="40" width="360" height="460" fill="#990000" />

            <!-- Group containing the main black card structure -->
            <g transform="translate(20, 20)">
                
                <!-- 2. Main Card Base (Solid Black) -->
                <rect x="0" y="0" width="360" height="460" fill="#000000" />

                <!-- 3. Header Text -->
                <text x="180" y="42" fill="#ffffff" font-weight="bold" font-size="20" letter-spacing="1" text-anchor="middle">memory-cartographer</text>

                <!-- 4. White Body Area & Dot Grid -->
                <rect x="12" y="64" width="336" height="384" fill="#ffffff" />
                <rect x="12" y="64" width="336" height="384" fill="url(#dotGrid)" />

                <!-- 5. Inner White Background (Before graphics) -->
                <rect x="50" y="116" width="260" height="260" fill="#ffffff" />

                <!-- 6. Inner Icon Graphics (Clipped to stay inside the frame) -->
                <g clip-path="url(#innerFrameClip)">
                    
                    <!-- A) Globe Base Shadow (Offset +12) -->
                    <circle cx="192" cy="332" r="80" fill="#990000" />

                    <!-- B) Globe Base Main -->
                    <!-- Globe center shifted down so the pin sits high -->
                    <circle cx="180" cy="320" r="80" fill="#ffffff" stroke="#000000" stroke-width="8" />

                    <!-- C) Shadow Layer for Inner Lines & Pin (+12, +12 offset) -->
                    <g transform="translate(12, 12)">
                        <!-- Longitudes (Vertical globe structural curves) -->
                        <path d="M 180 240 Q 110 300 120 400" fill="none" stroke="#990000" stroke-width="6" />
                        <path d="M 180 240 L 180 400" fill="none" stroke="#990000" stroke-width="6" />
                        <path d="M 180 240 Q 250 300 240 400" fill="none" stroke="#990000" stroke-width="6" />

                        <!-- Latitudes (Lines of code wrapping the globe) -->
                        <!-- Line 1 -->
                        <path d="M 111 280 Q 180 320 249 280" fill="none" stroke="#990000" stroke-width="12" stroke-linecap="square" stroke-dasharray="20 10 35 10 25 10" />
                        <!-- Line 2 -->
                        <path d="M 100 320 Q 180 370 260 320" fill="none" stroke="#990000" stroke-width="12" stroke-linecap="square" stroke-dasharray="40 15 25 15 30 15" />
                        <!-- Line 3 -->
                        <path d="M 111 360 Q 180 400 249 360" fill="none" stroke="#990000" stroke-width="12" stroke-linecap="square" stroke-dasharray="15 15 50 15" />

                        <!-- Terminal Prompt angled beside the globe -->
                        <path d="M 75 312 L 85 320 L 75 328" fill="none" stroke="#990000" stroke-width="6" stroke-linecap="square" />

                        <!-- Map Pin pointing at the North Pole -->
                        <path d="M 180 240 L 140 160 A 40 40 0 1 1 220 160 Z M 168 150 L 192 150 L 192 174 L 168 174 Z" fill="#990000" fill-rule="evenodd" />
                    </g>

                    <!-- D) Main Layer for Inner Lines & Pin -->
                    <g>
                        <!-- Longitudes (Vertical globe structural curves) -->
                        <path d="M 180 240 Q 110 300 120 400" fill="none" stroke="#000000" stroke-width="6" />
                        <path d="M 180 240 L 180 400" fill="none" stroke="#000000" stroke-width="6" />
                        <path d="M 180 240 Q 250 300 240 400" fill="none" stroke="#000000" stroke-width="6" />

                        <!-- Latitudes (Lines of code wrapping the globe) -->
                        <!-- Line 1 -->
                        <path d="M 111 280 Q 180 320 249 280" fill="none" stroke="#000000" stroke-width="12" stroke-linecap="square" stroke-dasharray="20 10 35 10 25 10" />
                        <!-- Line 2 -->
                        <path d="M 100 320 Q 180 370 260 320" fill="none" stroke="#000000" stroke-width="12" stroke-linecap="square" stroke-dasharray="40 15 25 15 30 15" />
                        <!-- Line 3 -->
                        <path d="M 111 360 Q 180 400 249 360" fill="none" stroke="#000000" stroke-width="12" stroke-linecap="square" stroke-dasharray="15 15 50 15" />

                        <!-- Terminal Prompt angled beside the globe -->
                        <path d="M 75 312 L 85 320 L 75 328" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="square" />

                        <!-- Map Pin pointing at the North Pole -->
                        <path d="M 180 240 L 140 160 A 40 40 0 1 1 220 160 Z M 168 150 L 192 150 L 192 174 L 168 174 Z" fill="#000000" stroke="#ffffff" stroke-width="6" stroke-linejoin="round" fill-rule="evenodd" />
                    </g>
                </g>

                <!-- 7. Outer Heavy Frame (Drawn over graphics to ensure crisp edges) -->
                <rect x="50" y="116" width="260" height="260" fill="none" stroke="#000000" stroke-width="12" />

                <!-- 8. 'pm' Project Badge -->
                <!-- Overlaps the bottom right corner of the inner frame -->
                
                <!-- Badge Shadow -->
                <rect x="268" y="354" width="56" height="40" fill="#990000" />
                <!-- Badge Box -->
                <rect x="256" y="342" width="56" height="40" fill="#ffffff" stroke="#000000" stroke-width="8" />
                <!-- Badge Text -->
                <text x="284" y="371" fill="#000000" font-weight="900" font-size="24" text-anchor="middle">pm</text>
                
            </g>
        </svg>
    </div>

</body>
</html>
