<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circuit Trace Background -->
  <path d="M 0 120 L 120 120 L 120 0 M 512 392 L 392 392 L 392 512" fill="none" stroke="#00f3ff" stroke-width="4" opacity="0.4" />
  <circle cx="120" cy="120" r="10" fill="#00f3ff" opacity="0.6" />
  <circle cx="392" cy="392" r="10" fill="#ff00ff" opacity="0.6" />

  <!-- Main Cyber Diamond -->
  <polygon points="256,60 452,256 256,452 60,256" fill="none" stroke="url(#cyber-grad)" stroke-width="16" filter="url(#neon-glow)" />
  
  <!-- Core Processor Module -->
  <rect x="180" y="180" width="152" height="152" fill="#000" stroke="#00f3ff" stroke-width="6" />
  <rect x="200" y="200" width="112" height="112" fill="#ff00ff" opacity="0.8" filter="url(#neon-glow)" />
  
  <!-- Data Nodes -->
  <rect x="236" y="236" width="40" height="40" fill="#fff" filter="url(#neon-glow)" />
  
  <!-- Connection Lines -->
  <line x1="256" y1="60" x2="256" y2="180" stroke="#00f3ff" stroke-width="8" stroke-dasharray="10,5" />
  <line x1="256" y1="332" x2="256" y2="452" stroke="#ff00ff" stroke-width="8" stroke-dasharray="10,5" />
  <line x1="60" y1="256" x2="180" y2="256" stroke="#00f3ff" stroke-width="8" stroke-dasharray="10,5" />
  <line x1="332" y1="256" x2="452" y2="256" stroke="#ff00ff" stroke-width="8" stroke-dasharray="10,5" />
</svg>
