<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <filter id="glass-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25" />
    </filter>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="10" />
      <feOffset dx="0" dy="8" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Vivid Background Blooms -->
  <circle cx="140" cy="140" r="130" fill="#06b6d4" opacity="0.6" filter="url(#glass-blur)" />
  <circle cx="370" cy="370" r="160" fill="#ec4899" opacity="0.6" filter="url(#glass-blur)" />

  <!-- Main Glass Diamond Surface -->
  <polygon points="256,60 452,256 256,452 60,256" 
    fill="rgba(255, 255, 255, 0.15)" 
    stroke="rgba(255, 255, 255, 0.4)" 
    stroke-width="1.5" 
    filter="url(#soft-shadow)" />
  
  <!-- Inner "Core" Glass Panel -->
  <rect x="180" y="180" width="152" height="152" rx="28" 
    fill="rgba(255, 255, 255, 0.1)" 
    stroke="rgba(255, 255, 255, 0.6)" 
    stroke-width="2" />
  
  <!-- Floating High-Lustre Core -->
  <rect x="216" y="216" width="80" height="80" rx="16" fill="#fff" opacity="0.95" />
  
  <!-- Subtle Highlight Detail -->
  <rect x="254" y="230" width="24" height="24" rx="6" fill="rgba(0,0,0,0.15)" />
  
  <!-- Glass Reflections -->
  <path d="M 120 180 Q 256 100 392 180" fill="none" stroke="rgba(255, 255, 255, 0.3)" stroke-width="4" stroke-linecap="round" />
</svg>
