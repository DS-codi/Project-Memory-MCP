# Project Memory MCP — Supervisor Configuration Reference
# Copy this file to %APPDATA%\ProjectMemory\supervisor.toml and
# adjust paths for your machine, or run .\start-supervisor.ps1 to
# have a working config written automatically.
# For isolated Wave validation (alternate control pipe + runtime env),
# use .\start-supervisor-wave-validation.ps1 at workspace root.
#
# All sections and keys are OPTIONAL — omit anything and the default
# value documented here will be used.

# ── Core supervisor settings ──────────────────────────────────────────────────

[supervisor]
# Minimum log level: trace | debug | info | warn | error
log_level = "info"

# Control-plane transport: named_pipe (Windows default, fastest) | tcp
control_transport = "named_pipe"

# Windows named-pipe path used by the VS Code extension to send control commands
control_pipe = "\\\\.\\pipe\\project-memory-supervisor"

# TCP port for the control API when control_transport = "tcp"
control_tcp_port = 45470

# ── MCP server ───────────────────────────────────────────────────────────────

[mcp]
enabled = true

# Port the MCP server listens on (extension connects here)
port = 3457

# "node" (default) or "container"
backend = "node"

[mcp.node]
command     = "node"
args        = ["dist/server.js"]
# Absolute path to the compiled server directory
working_dir = "C:\\Users\\User\\Project_Memory_MCP\\Project-Memory-MCP\\server"

# Optional supervisor-hosted MCP runtime mode (feature-flagged via env vars):
#   PM_SUPERVISOR_MCP_SUBPROCESS_RUNTIME=1
#   PM_SUPERVISOR_MCP_SUBPROCESS_MAX_CONCURRENCY=4
#   PM_SUPERVISOR_MCP_SUBPROCESS_TIMEOUT_MS=30000
#   PM_SUPERVISOR_MCP_SUBPROCESS_WAVE_COHORTS=wave1,wave2,wave3,wave4
#   PM_SUPERVISOR_MCP_SUBPROCESS_HARD_STOP_GATE=1
#
# Wave 1 validation minimum preconditions:
#   PM_SUPERVISOR_MCP_SUBPROCESS_RUNTIME=1
#   PM_SUPERVISOR_MCP_SUBPROCESS_WAVE_COHORTS=wave1
#   PM_SUPERVISOR_MCP_SUBPROCESS_HARD_STOP_GATE=1
#
# When enabled, the supervisor serves MCP execution via control request
# `McpRuntimeExec` using async subprocess workers instead of starting the
# pool+proxy MCP service.
#
# Wave cohorts + hard-stop gate:
# - `PM_SUPERVISOR_MCP_SUBPROCESS_WAVE_COHORTS` controls which cohorts may
#   execute when hard-stop gating is enabled.
# - `PM_SUPERVISOR_MCP_SUBPROCESS_HARD_STOP_GATE=1` rejects out-of-cohort
#   execution with deterministic `error_class: "hard_stop"` envelopes.
#
# Reviewer isolated-validation shell setup:
#   $env:PM_ORCHESTRATION_SUPERVISOR_PIPE_PATH="\\.\pipe\project-memory-supervisor-wave-validation"
#   # run reviewer validation commands
#   .\stop-supervisor.ps1 -PipeName "project-memory-supervisor-wave-validation"   # isolated teardown; avoids default-instance force-kill
#
# Isolated launcher behavior:
# - .\start-supervisor-wave-validation.ps1 passes PM_SUPERVISOR_* flags using
#   explicit child-process environment overrides (no reliance on parent-shell
#   env inheritance semantics).
# - Its default validation cohort is `wave1` (overridable via -WaveCohorts).

# Environment variables injected into the MCP server process
# [mcp.node.env]
# SOME_VAR = "value"

# Container backend (only used when backend = "container")
[mcp.container]
engine         = "podman"
image          = "project-memory-mcp-project-memory:latest"
container_name = "project-memory-mcp"
ports          = ["3000:3000"]

# ── Interactive Terminal ──────────────────────────────────────────────────────

[interactive_terminal]
enabled = true
port    = 3458

# Full path to the interactive-terminal executable
command = "C:\\Users\\User\\Project_Memory_MCP\\Project-Memory-MCP\\interactive-terminal\\target\\release\\interactive-terminal.exe"

# Optional environment variables injected into interactive-terminal.
# Use this when running coding-subagent sessions against Gemini.
#
# Provider contract (recommended):
#   GEMINI_API_KEY = <your key>
#   GOOGLE_API_KEY = <same key>     # compatibility alias for SDKs/tools
#
# If you launch Supervisor via install.ps1 and your secrets file contains
# PMTA-key=<key>, install.ps1 maps that value to both GEMINI_API_KEY and
# GOOGLE_API_KEY at process launch time (without writing the key to this file).
#
# [interactive_terminal.env]
# GEMINI_API_KEY = "set-in-local-env-not-in-repo"
# GOOGLE_API_KEY = "set-in-local-env-not-in-repo"

# ── Dashboard ────────────────────────────────────────────────────────────────

[dashboard]
enabled      = true
port         = 3459
requires_mcp = true

# Which dashboard variant to run.
#   "classic" (default) — Node.js Express server in dashboard/server/
#                         Set command/args/working_dir below accordingly.
#   "solid"             — Static SolidJS SPA built from dashboard-solid/.
#                         The supervisor will serve dashboard-solid/dist/ using
#                         `npx serve -s . -l {port}` (no working_dir override needed).
#                         Ensure dashboard-solid/ has been built first:
#                         pm-cli install dashboard-solid
variant = "classic"

# Dashboard backend server process (dashboard/server/ — runs Express + WebSocket).
# This is separate from the frontend statics (dashboard/dist/) which are served
# by the VS Code extension's webview panel.
command     = "node"
args        = ["dist/index.js"]
working_dir = "C:\\Users\\User\\Project_Memory_MCP\\Project-Memory-MCP\\dashboard\\server"

# ── Fallback API (proxy-mounted REST fallback) ──────────────────────────────

[fallback_api]
enabled = true
port    = 3465

# Dedicated fallback backend process served behind proxy route /api/fallback/*
command     = "node"
args        = ["dist/fallback-rest-main.js"]
working_dir = "C:\\Users\\User\\Project_Memory_MCP\\Project-Memory-MCP\\server"

# Optional environment variables injected into fallback API process.
# [fallback_api.env]
# FALLBACK_API_HOST = "127.0.0.1"
# FALLBACK_API_PORT = "3465"

# ── CLI MCP server (consolidated into claude_mcp — see below) ────────────────
#
# [cli_mcp] is no longer a separate process. The claude_mcp server handles both
# port 3467 (Claude Code / client-proxy) and port 3466 (CLI agents) via the
# --cli-port argument. Set cli_mcp.enabled = false (the default).

[cli_mcp]
enabled = false
port    = 3466

command     = "node"
args        = ["dist/index-claude.js", "--transport", "streamable-http", "--port", "3466"]
# working_dir = "C:\\Users\\User\\Project_Memory_MCP\\Project-Memory-MCP\\server"

# [cli_mcp.env]
# PM_PROXY_PATH   = "C:\\Users\\User\\AppData\\Roaming\\ProjectMemory\\bin\\client-proxy.exe"
# PM_CLI_MCP_PORT = "3466"

# ── Claude Code MCP server (client-proxy target for Claude Code sessions) ─────

[claude_mcp]
# Unified MCP server for both Claude Code (port 3467, via client-proxy) and
# CLI agents (port 3466, via --cli-port).  The --cli-port flag starts a second
# HTTP listener on the same process, sharing the same McpServer instance and
# SQLite database.  All workspace .mcp.json files reference port 3467 through
# client-proxy as the single "pmmcp" entry.
enabled = true
port    = 3467

command     = "node"
args        = ["dist/index-claude.js", "--transport", "streamable-http", "--cli-port", "3466"]
# working_dir = "C:\\Users\\User\\Project_Memory_MCP\\Project-Memory-MCP\\server"

# [claude_mcp.env]
# PM_PROXY_PATH      = "C:\\Users\\User\\AppData\\Roaming\\ProjectMemory\\bin\\client-proxy.exe"
# PM_CLAUDE_MCP_PORT = "3467"

# ── Runtime output capture (subprocess stdout/stderr telemetry) ─────────────

[runtime_output]

# When false, supervisor still drains child process pipes (to avoid blocking)
# but skips buffering and broadcast overhead for runtime output events.
enabled = true

# ── Approval gate dialog ──────────────────────────────────────────────────────

[approval]
default_countdown_seconds = 60
default_on_timeout        = "approve"   # "approve" | "reject"
always_on_top             = true

# ── Brainstorm GUI ────────────────────────────────────────────────────────────

[brainstorm_gui]
enabled         = true
command         = "C:\\Users\\User\\Project_Memory_MCP\\Project-Memory-MCP\\target\\release\\pm-brainstorm-gui.exe"
timeout_seconds = 300
window_width    = 720
window_height   = 640
always_on_top   = false

# ── Approval GUI ──────────────────────────────────────────────────────────────

[approval_gui]
enabled         = true
command         = "C:\\Users\\User\\Project_Memory_MCP\\Project-Memory-MCP\\target\\release\\pm-approval-gui.exe"
timeout_seconds = 60
window_width    = 480
window_height   = 320
always_on_top   = true

# ── Reconnect policy (applies to all managed processes) ──────────────────────

[reconnect]
initial_delay_ms = 500
max_delay_ms     = 30000
multiplier       = 2.0
max_attempts     = 0        # 0 = unlimited retries
jitter_ratio     = 0.2

# ── Data-change event broadcast ───────────────────────────────────────────────
# The supervisor maintains an in-process SSE broadcast channel so clients
# (VS Code extension, dashboard, scripts) can subscribe to plan/step changes
# without polling.  Subscribe at GET /supervisor/events.

[events]
enabled            = true   # set false to disable the channel entirely
buffer_size        = 256    # tokio broadcast channel capacity
heartbeat_interval = 30     # seconds between keep-alive pings to SSE clients
replay_buffer_size = 100    # number of past events held for Last-Event-Id replay

# ── GUI server / Virtual Monitor ─────────────────────────────────────────────
# The supervisor GUI HTTP server (default port 3464) also hosts the file-browser
# API used by the Virtual Monitor.  Click "Virtual Monitor" in the supervisor
# footer to open the monitor in your default browser.

[gui_server]
# port         = 3464           # default
# bind_address = "0.0.0.0"     # use "127.0.0.1" to restrict to loopback

# URL opened when the "Virtual Monitor" button is clicked.
# Defaults to the mobile Vite dev server.
# monitor_url = "http://127.0.0.1:5173/monitor"

# Extra filesystem paths the file browser is permitted to read.
# Workspace paths registered in the MCP database are always included.
# monitor_allowed_paths = [
#   "C:\\Users\\User\\Documents",
#   "C:\\Users\\User\\Projects",
# ]

# ── API-key authentication ────────────────────────────────────────────────────
# The supervisor GUI HTTP server requires an API key in the X-PM-API-Key header
# for all requests except GET /gui/ping.
# If api_key is absent the supervisor auto-generates a 64-character hex key on
# first startup and appends it to this file so the key persists across restarts.

[auth]
# api_key = "your-secret-key-here"   # uncomment and set to pin a fixed key

# ── AI Chatbot ───────────────────────────────────────────────────────────────
# The in-supervisor chatbot panel supports three providers: gemini, copilot, claude.
#
# Credential resolution order (chatbot panel):
#   gemini  → api_key > GEMINI_API_KEY env > GOOGLE_API_KEY env > gcloud auth print-access-token
#   copilot → api_key > gh auth token
#   claude  → api_key > ANTHROPIC_API_KEY env  (falls back to gemini, then copilot, if unavailable)
#
# Interactive terminal sessions always prefer account-based auth first:
#   claude  → claude CLI OAuth (your claude.ai subscription, zero config)
#   copilot → gh auth token
#   gemini  → gcloud ADC
# A configured api_key is used only when account auth is unavailable.

[chatbot]
enabled  = true
provider = "gemini"   # "gemini" | "copilot" | "claude"

# API key for the chosen provider.  Leave blank to use account-based auth
# (gh auth token for copilot, gcloud ADC for gemini, ANTHROPIC_API_KEY for claude).
api_key  = ""

# Model override — empty = use sensible defaults per provider:
#   gemini  → gemini-2.0-flash
#   copilot → gpt-4o
#   claude  → claude-sonnet-4-6
model    = ""

# ── mDNS service advertisement ────────────────────────────────────────────────
# When enabled, supervisor advertises itself on the local network via mDNS-SD
# (_projectmemory._tcp.local.) so the mobile app can discover it automatically
# without needing a manually entered IP address.

[mdns]
enabled = true
# instance_name = "ProjectMemory"   # default: "ProjectMemory"
